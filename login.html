<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="auth-container">

    <div class="auth-card glass">
        <h2 class="mb-3">Welcome Back!</h2>
        <p class="text-muted">login to your account</p>

        <input type="email" id="loginEmail" class="form-control mb-2" placeholder="Email">
        <input type="password" id="loginPassword" class="form-control mb-2" placeholder="Password">

        <button class="btn btn-success w-100 mb-2" onclick="login()">Login</button>

        <p class="small text-center mt-3">
            Don't have an account?
            <a href="index.html">Sign Up</a>
        </p>

    </div>
</div>
</body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
