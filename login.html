<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container from-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p class="sub-text">Login to continue</p>
            <div class="input-icon">
                <input type="email" placeholder="Email" id="loginEmail" required>
                <i class="bi bi-envelope"></i>
            </div>

            <div class="input-icon">
                <input type="password" placeholder="Password" id="loginPassword" required>
                <i class="bi bi-lock"></i>
            </div>
            <button type="button" class="btn btn-gradient" onclick="login()">Login</button>
            <p class="small text-center mt-3 login-text">
                Don't have an account?
                <a href="index.html">Sign Up</a>
            </p>
            <p class="or-text">Or login with</p>

            <div class="social-icons">
                <a href="#" class="social google"><i class="bi bi-google"></i></a>
                <a href="#" class="social facebook"><i class="bi bi-facebook"></i></a>
                <a href="#" class="social github"><i class="bi bi-github"></i></a>
                <a href="#" class="social linkedin"><i class="bi bi-linkedin"></i></a>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="app.js"></script>
</body>

</html>
