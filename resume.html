<!DOCTYPE html>
<html>
<head>
    <title>Resume Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3 fixed-top">
  <a class="navbar-brand fw-bold" href="#">Resume Builder</a>

  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navMenu">

    <ul class="navbar-nav ms-auto">

      <li class="nav-item">
        <a class="nav-link" href="#" onclick="toggleDark()">Dark Mode</a>
      </li>

      <li class="nav-item">
        <a class="nav-link text-danger" href="#" onclick="logout()"> Logout</a>
      </li>

    </ul>

  </div>
</nav>
    <div class="container">
        <div class="row resume-builder">
            <div class="col-md-10 p-4  mt-5 mb-5 rounded  glass">

                <h3>Resume Editor</h3>

                <input id="name" class="form-control mb-2" placeholder="Full Name" oninput="updatePreview()">
                <input id="title" class="form-control mb-2" placeholder="Job Title" oninput="updatePreview()">
                <input id="email" class="form-control mb-2" placeholder="Email" oninput="updatePreview()">
                <input id="phone" class="form-control mb-3" placeholder="Phone" oninput="updatePreview()">

                <textarea id="summary" class="form-control mb-2" placeholder="Summary" oninput="updatePreview()"></textarea>
                <textarea id="education" class="form-control mb-2" placeholder="Education" oninput="updatePreview()"></textarea>
                <textarea id="experience" class="form-control mb-2" placeholder="Experience" oninput="updatePreview()"></textarea>
                <textarea id="skills" class="form-control mb-3" placeholder="Skills" oninput="updatePreview()"></textarea>

               <button class="btn btn-primary w-100 mb-2" type="button" onclick="autoSave()">Save Now</button>


            </div>
            

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>

</body>

</html>
