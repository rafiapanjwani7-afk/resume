<!DOCTYPE html>
<html>
<head>
  <title>Resume Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3 fixed-top">
    <a class="navbar-brand fw-bold" href="#">Resume Builder</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link btn-logout" href="#" onclick="logout()">Logout</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Form Section -->
  <div class="container mt-5 pt-5 ">
    <div class="row justify-content-center ">

      <div class="col-md-8 col-lg-6  p-4 " id="editor">
<div class="card resume-card">
        <h3 class="text-center mb-4">Resume Editor</h3>

        <form id="cvForm">

          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" id="name" placeholder="John Doe" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-control" id="phone" placeholder="+92 300 1234567" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" placeholder="example@domain.com" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Languages Known</label>
            <input type="text" id="language" class="form-control" placeholder="Type language and press Enter">
            <div id="languages-container" class="mt-2"></div>
          </div>

          <div class="mb-3">
            <label class="form-label">Profile Image</label>
            <input type="file" id="imgInput" class="form-control" accept="image/*" required>
            <img id="previewImg" style="display:none; width:100px; margin-top:10px;">
          </div>

          <div class="mb-3">
            <label class="form-label">Professional Summary</label>
            <textarea class="form-control" id="summary" rows="3" required></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Education</label>
            <textarea class="form-control" id="education" rows="3" required></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Work Experience</label>
            <textarea class="form-control" id="experience" rows="3" required></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Skills</label>
            <textarea class="form-control" id="skills" rows="3" required></textarea>
          </div>

          <button class="btn btn-gradient w-100">Select Template</button>

        </form>

      </div>
</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="app.js"></script>

</body>
</html>
