<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="auth-container">

    <div class="auth-card glass">

        <h2 class="mb-3">Create Account </h2>
        <p class="text-muted">Start building your resume</p>
        <input type="text" id="username" class="form-control mb-2" placeholder="Username">
        <input type="email" id="email" class="form-control mb-2" placeholder="Email">
        <input type="password" id="password" class="form-control mb-2" placeholder="Password">
        <input type="tel" id="phone" class="form-control mb-2" placeholder="Phone">
        <input type="text" id="cnic" class="form-control mb-3" placeholder="CNIC">
        <button class="btn btn-success w-100 mb-2" onclick="signup()">Sign Up</button>
        <p class="small text-center mt-3">
            Already have account?
            <a href="login.html">Login</a>
        </p>
    </div>
</div>
</body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>

</html>
