<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>

<body >
    
    <div class="auth-container from-container">

    <div class="auth-card">

        <h2>Create Account</h2>
        <p class="sub-text">Start building your resume</p>

        <!-- Inputs -->
        <div class="input-icon">
            <input type="text" id="username" placeholder="Username" required>
            <i class="bi bi-person"></i>
        </div>

        <div class="input-icon">
            <input type="email" id="email" placeholder="Email" required>
            <i class="bi bi-envelope"></i>
        </div>

        <div class="input-icon">
            <input type="password" id="password" placeholder="Password" required>
            <i class="bi bi-lock"></i>
        </div>

        <button type="button" class="btn-gradient" onclick="signup()">Sign Up</button>

        <p class="or-text">Or continue with</p>

        <!-- Social -->
        <div class="social-icons">
            <a href="#" class="social google"><i class="bi bi-google"></i></a>
            <a href="#" class="social facebook"><i class="bi bi-facebook"></i></a>
            <a href="#" class="social github"><i class="bi bi-github"></i></a>
            <a href="#" class="social linkedin"><i class="bi bi-linkedin"></i></a>
        </div>

        <p class="login-text">
            Already have an account? <a href="login.html">Login</a>
        </p>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="app.js"></script>
</body>
</html>
